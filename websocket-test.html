<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Chat Test</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<h2>WebSocket Chat Test</h2>

<button onclick="connect()">Connect</button>
<button onclick="subscribe()">Subscribe</button>
<button onclick="sendMessage()">Send Message</button>

<br><br>

<label>JWT Token:</label><br>
<input id="token" size="80"><br><br>

<label>Chat ID:</label><br>
<input id="chatId" size="50"><br><br>

<label>Message:</label><br>
<input id="message" size="50"><br><br>

<h3>Response:</h3>
<pre id="response"></pre>

<script>
let stompClient = null;
let currentSubscription = null;

function connect() {
    const socket = new SockJS("http://localhost:8080/ws-chat");
    stompClient = Stomp.over(socket);

    const token = document.getElementById("token").value;

    stompClient.connect(
        { "Authorization": "Bearer " + token },
        function(frame) {
            console.log("Connected: " + frame);
            document.getElementById("response").innerHTML += "--- Connected to WebSocket ---\n";
        },
        function(error) {
            console.error("STOMP Error: " + error);
            document.getElementById("response").innerHTML += "Connection Error!\n";
        }
    );
}

function subscribe() {
    const chatId = document.getElementById("chatId").value;

    if (currentSubscription !== null) {
        console.log("Unsubscribing from previous chat...");
        currentSubscription.unsubscribe();
    }


    currentSubscription = stompClient.subscribe("/topic/chat/" + chatId, function(message) {

        const payload = JSON.parse(message.body);
        
        const msgData = payload.data ? payload.data : payload; 

        const formattedMsg = `[${msgData.time}] ${msgData.sender}: ${msgData.content}\n`;
        document.getElementById("response").innerHTML += "Received: " + formattedMsg;
        
        console.log("Full DTO received:", msgData);
    });
    
    document.getElementById("response").innerHTML += "--- Subscribed to chat: " + chatId + " ---\n";
}

function sendMessage() {
    const chatId = document.getElementById("chatId").value;
    const messageContent = document.getElementById("message").value;

    if (!stompClient || !stompClient.connected) {
        alert("Connect dulu bosku!");
        return;
    }

    stompClient.send(
        "/app/send-message/" + chatId,
        { "content-type": "application/json" },
        JSON.stringify({
            content: messageContent,
            iv: null,   
            type: "TEXT"
        })
    );
    
    document.getElementById("message").value = "";
}
</script>

</body>
</html>
